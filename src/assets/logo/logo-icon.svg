<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#1E3A5F"/>

  <!-- Lighthouse body -->
  <rect x="43" y="38" width="14" height="28" rx="2" fill="#F2F4F7"/>
  <!-- Lighthouse tower (tapered) -->
  <polygon points="41,38 46,20 54,20 59,38" fill="#F2F4F7"/>
  <!-- Lighthouse top (lantern room) -->
  <rect x="44" y="14" width="12" height="7" rx="1" fill="#16B5B0"/>
  <!-- Light beam -->
  <polygon points="50,14 28,6 28,14" fill="#16B5B0" opacity="0.5"/>
  <!-- Balcony line -->
  <line x1="41" y1="38" x2="59" y2="38" stroke="#1E3A5F" stroke-width="1.5"/>
  <!-- Stripe -->
  <rect x="43" y="52" width="14" height="4" fill="#16B5B0" opacity="0.6"/>

  <!-- Waves -->
  <path d="M10 76 Q22 71 35 76 Q48 81 61 76 Q74 71 90 76" fill="none" stroke="#16B5B0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M16 84 Q28 79 41 84 Q54 89 67 84 Q80 79 90 84" fill="none" stroke="#ABE2E1" stroke-width="2" stroke-linecap="round"/>
</svg>
